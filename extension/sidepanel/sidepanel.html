<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diligence Sidecar</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div>
        <div class="brand">
          <span class="logo-dot"></span>
          <h1>Saved Properties</h1>
          <div id="map-status" class="map-status-icon" title="Map not detected on page">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon>
              <line x1="9" y1="3" x2="9" y2="18"></line>
              <line x1="15" y1="6" x2="15" y2="21"></line>
            </svg>
          </div>
        </div>
        <p class="header-copy">Ranked by weighted diligence score</p>
      </div>
      <span id="property-count" class="property-count">0</span>
    </header>

    <main class="app-content">
      <div id="empty-state" class="empty-state">
        <div class="empty-heart">&#9825;</div>
        <h2>No saved properties yet</h2>
        <p>Heart a Redfin property to add it to your ranked diligence list.</p>
      </div>

      <div id="portfolio-view" class="hidden">
        <div class="list-heading">
          <span>Property</span>
          <span>Score</span>
        </div>
        <div id="property-list" class="property-list"></div>
      </div>
    </main>

    <footer class="app-footer">
      <details class="settings-details">
        <summary class="settings-summary">
          <span>Backend settings</span>
          <span class="arrow">▾</span>
        </summary>
        <div class="settings-content">
          <div class="input-group">
            <label for="input-api-url">Lambda Function URL</label>
            <input type="url" id="input-api-url" placeholder="https://example.lambda-url.us-west-2.on.aws/">
          </div>
          <div class="input-group">
            <label for="input-api-token">API Token (Sync Token)</label>
            <input type="password" id="input-api-token" placeholder="Enter bearer token">
          </div>
          <label class="checkbox-container">
            <input type="checkbox" id="chk-backend-sync">
            <span class="checkmark"></span>
            Sync completed analysis to Lambda/S3
          </label>
          <div class="settings-status">
            Backend: <span id="connection-status" class="status-indicator disconnected">Checking...</span>
          </div>
        </div>
      </details>
    </footer>
  </div>

  <script src="../shared/scoring.js"></script>
  <script src="sidepanel-model.js"></script>
  <script src="sidepanel-api.js"></script>
  <script src="sidepanel-analysis.js"></script>
  <script src="sidepanel-storage.js"></script>
  <script src="sidepanel-renderer.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
